<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients Lists</title>
    <link rel="stylesheet" href="cssTask.css">
</head>
<body>
    <main class="page">
        <section class="block">
            <h1>Ingredients for Biryani</h1>
            <ul class="list">
                <li class="accent-warm">Rice</li>
                <li class="accent-warm">Chicken
                    <ul class="sublist">
                        <li>Fried</li>
                        <li>Grilled</li>
                        <li>Roasted</li>
                    </ul>
                </li>
                <li class="accent-cool">Paneer</li>
            </ul>
        </section>

        <section class="block block-tight">
            <h2>Fighter Jet</h2>
            <ul class="list">
                <li class="accent-warm">Spices</li>
                <li class="accent-warm">Gas/Electric</li>
            </ul>
        </section>

        <section class="block">
            <h1>Ingredients for Lassi</h1>
            <ul class="list">
                <li class="accent-green">Curd</li>
                <li class="accent-green">Water</li>
                <li class="accent-green">Sugar
                    <ul class="sublist sugar-sublist">
                        <li class="accent-sugar">White Sugar</li>
                        <li class="accent-sugar">Brown Sugar</li>
                    </ul>
                </li>
                <li class="accent-green">Malai</li>
                <li class="accent-green">Kova</li>
            </ul>
        </section>
    </main>
</body>
</html>
