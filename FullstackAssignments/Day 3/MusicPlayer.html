<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music App</title>
</head>

    <!-- Header -->
    <div style="background-color:#2c3e50; color:white; text-align:center; padding:20px;">
        <h1>Music App</h1>
    </div>

    <!-- Main Container Table -->
    <table align="center" cellpadding="0" cellspacing="0" border="0" style="margin-top:20px;">
        <tr>
            <td colspan="2" style="height:0;"></td>
        </tr>
        <tr>
            <td bgcolor="#dcdcdc" align="center" valign="middle" width="140" height="115">
                <img src="../../Assets/Images/legacy.jpg" alt="Eminem - Legacy album artwork" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            </td>
            <td bgcolor="#0b0c1a" align="center" valign="middle" width="400" height="115">
                <audio controls style="width:85%;" title="Eminem - Legacy (lyrics)" aria-label="Play Eminem - Legacy (lyrics)">
                    <source src="../../Assets/Audio/Eminem - Legacy (lyrics).mp3" type="audio/mpeg">
                </audio>
            </td>
        </tr>
        <tr>
            <td bgcolor="#dcdcdc" align="center" valign="middle" width="140" height="115">
                <img src="../../Assets/Images/tooSweet.jpg" alt="Hozier - Too Sweet album artwork" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            </td>
            <td bgcolor="#0b0c1a" align="center" valign="middle" width="400" height="115">
                <audio controls style="width:85%;" title="Hozier - Too Sweet (Official Lyric Video)" aria-label="Play Hozier - Too Sweet (Official Lyric Video)">
                    <source src="../../Assets/Audio/Hozier - Too Sweet (Official Lyric Video).mp3" type="audio/mpeg">
                </audio>
            </td>
        </tr>
        <tr>
            <td bgcolor="#dcdcdc" align="center" valign="middle" width="140" height="115">
                <img src="../../Assets/Images/oldTownRoad.jpg" alt="Lil Nas X - Old Town Road album artwork" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            </td>
            <td bgcolor="#0b0c1a" align="center" valign="middle" width="400" height="115">
                <audio controls style="width:85%;" title="Lil Nas X - Old Town Road (Lyrics) feat Billy Ray Cyrus" aria-label="Play Lil Nas X - Old Town Road (Lyrics) feat Billy Ray Cyrus">
                    <source src="../../Assets/Audio/Lil Nas X - Old Town Road (Lyrics) feat Billy Ray Cyrus.mp3" type="audio/mpeg">
                </audio>
            </td>
        </tr>
        <tr>
            <td bgcolor="#dcdcdc" align="center" valign="middle" width="140" height="115">
                <img src="../../Assets/Images/closer.jpg" alt="The Chainsmokers - Closer album artwork" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            </td>
            <td bgcolor="#0b0c1a" align="center" valign="middle" width="400" height="115">
                <audio controls style="width:85%;" title="The Chainsmokers - Closer (Lyric) ft. Halsey" aria-label="Play The Chainsmokers - Closer (Lyric) ft. Halsey">
                    <source src="../../Assets/Audio/The Chainsmokers - Closer (Lyric) ft. Halsey.mp3" type="audio/mpeg">
                </audio>
            </td>
        </tr>
    </table>

</body>
</html>
